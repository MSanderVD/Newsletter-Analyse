# updated 2026-06-24
name: Newsletter-Analyse

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "30 7 * * 1"
    - cron: "0 8 1 * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Analyse-Modus"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  daily:
    name: Tagesanalyse
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily' ||
        github.event_name == 'schedule' && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dateien anzeigen (Debug)
        run: ls -la
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Tagesanalyse ausführen
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CREDENTIALS_JSON:    ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:          ${{ secrets.GMAIL_TOKEN_JSON }}
          AZURE_TENANT_ID:           ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:           ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:       ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_EMAIL:       ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_FOLDER_PATH:      ${{ secrets.ONEDRIVE_FOLDER_PATH }}
          REPORT_RECIPIENT_EMAIL:    ${{ secrets.REPORT_RECIPIENT_EMAIL }}
        run: python analyse.py --mode daily

  weekly:
    name: Wochenanalyse
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly' ||
        github.event_name == 'schedule' && github.event.schedule == '30 7 * * 1'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Wochenanalyse ausführen
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CREDENTIALS_JSON:    ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:          ${{ secrets.GMAIL_TOKEN_JSON }}
          AZURE_TENANT_ID:           ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:           ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:       ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_EMAIL:       ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_FOLDER_PATH:      ${{ secrets.ONEDRIVE_FOLDER_PATH }}
          REPORT_RECIPIENT_EMAIL:    ${{ secrets.REPORT_RECIPIENT_EMAIL }}
        run: python analyse.py --mode weekly

  monthly:
    name: Monatsanalyse
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly' ||
        github.event_name == 'schedule' && github.event.schedule == '0 8 1 * *'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Monatsanalyse ausführen
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CREDENTIALS_JSON:    ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:          ${{ secrets.GMAIL_TOKEN_JSON }}
          AZURE_TENANT_ID:           ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:           ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:       ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_EMAIL:       ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_FOLDER_PATH:      ${{ secrets.ONEDRIVE_FOLDER_PATH }}
          REPORT_RECIPIENT_EMAIL:    ${{ secrets.REPORT_RECIPIENT_EMAIL }}
        run: python analyse.py --mode monthly
